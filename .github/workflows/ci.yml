name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  api:
    name: API (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Provision SQLite databases (dev + test)
        run: |
          DATABASE_URL="file:./dev.db" npx prisma db push --skip-generate
          DATABASE_URL="file:./test.db" npx prisma db push --skip-generate
      - run: npm run build
      - run: npm test
      - name: e2e
        run: DATABASE_URL="file:./test.db" npm run test:e2e

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
